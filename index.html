<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Graduation Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      perspective: 1000px;
    }

    .card-container {
      width: 360px;
    }

    .lanyard {
      width: 60px;
      height: 120px;
      background: linear-gradient(#2d7a6e, #1a4d45);
      margin: auto;
      border-radius: 8px;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      margin-top: -20px;
      transition: 0.3s;
      transform-style: preserve-3d;
    }

    .header {
      background: linear-gradient(135deg, #2d7a6e, #1a4d45);
      color: white;
      text-align: center;
      padding: 24px;
    }

    .profile {
      display: flex;
      gap: 16px;
      padding: 16px;
      align-items: center;
    }

    .profile img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
    }

    .section {
      padding: 16px;
      border-top: 1px solid #eee;
    }

    .qr {
      text-align: center;
      padding: 16px;
    }

    .qr img {
      width: 100px;
      border: 2px solid #2d7a6e;
      border-radius: 10px;
      padding: 6px;
    }

    .footer {
      text-align: center;
      padding: 12px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="card-container">
  <div class="lanyard"></div>

  <div class="card">
    <div class="header">
      <p>Official Invitation</p>
      <h1>STANFORD UNIVERSITY</h1>
      <p>School of Engineering</p>
    </div>

    <div class="profile">
      <img src="https://raw.githubusercontent.com/thinh1910/thiep-tot-nghiep/main/avt.jpg">
      <div>
        <p>Graduate Name</p>
        <h2>SARAH MITCHELL</h2>
        <p>Class of 2025</p>
      </div>
    </div>

    <div class="section">
      <p><b>Degree:</b> Master of Science</p>
      <p>Computer Science & AI</p>
    </div>

    <div class="section">
      <p><b>Date:</b> June 15, 2025</p>
      <p>2:00 PM</p>
    </div>

    <div class="section">
      <p><b>Location:</b> Stanford Campus</p>
    </div>

    <div class="qr">
      <img src="https://placehold.co/200x200?text=QR">
    </div>

    <div class="footer">
      You're Invited
    </div>
  </div>
</div>

<script>
const card = document.querySelector(".card");

card.addEventListener("mousemove", (e) => {
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const rotateX = -(y - rect.height / 2) / 15;
  const rotateY = (x - rect.width / 2) / 15;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
});

card.addEventListener("mouseleave", () => {
  card.style.transform = "rotateX(0) rotateY(0)";
});
</script>

</body>
</html>
